name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint Python Code with flake8
        run: |
          # Stop the build if there are critical Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all other errors as warnings so the build does not fail purely on formatting
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build-and-push-docker:
    needs: lint-python
    runs-on: ubuntu-latest
    # Only execute the Docker pushes when pushing directly to the main branch
    if: github.event_name == 'push'
    env:
      # NOTE: Create these inside your GitHub Repository:
      # Settings -> Secrets and variables -> Actions -> New repository secret
      
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }} # Use a personal access token for Docker Hub, not your account password
      
      # Define exactly what you want the image path to be. 
      # Example: "your_docker_username/trip-planner-backend"
      BACKEND_IMAGE: ${{ secrets.BACKEND_IMAGE_NAME }}
      FRONTEND_IMAGE: ${{ secrets.FRONTEND_IMAGE_NAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Authenticates securely so you can push your images
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          # Tags the image with 'latest'. You can also configure dynamic tags using github.sha if desired.
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
